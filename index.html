<title>Free QR Code Generator Online| 100% free</title>
<html lang="en">
<head>

<meta name="keywords" content="QR code generator, free QR code, QR maker online">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Free QR Code Generator | 100% Free | Without Signup </title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body{
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
    color:#fff;
}

.container{
    background:#1e1e2f;
    padding:25px;
    border-radius:15px;
    text-align:center;
    width:300px;
    box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

h2{
    margin-bottom:15px;
}

input{
    width:100%;
    padding:10px;
    border:none;
    border-radius:8px;
    outline:none;
    margin-bottom:15px;
}

button{
    padding:10px 15px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    margin:5px;
    font-weight:bold;
}

.generate{
    background:#00c9ff;
    color:#000;
}

.download{
    background:#00ff94;
    color:#000;
}

#qrBox{
    margin-top:15px;
}

canvas{
    margin-top:10px;
}
</style>
</head>

<body>

<div class="container">
    <h2>QR Generator</h2>

    <input type="text" id="qrText" placeholder="Enter text or URL">

    <button class="generate" onclick="generateQR()">Generate</button>
    <button class="download" onclick="downloadQR()" id="downloadBtn" disabled>Download</button>

    <div id="qrBox"></div>
</div>

<!-- QR Library -->
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<script>
function generateQR(){
    let text = document.getElementById("qrText").value;
    let qrBox = document.getElementById("qrBox");

    if(text === ""){
        alert("Please enter text!");
        return;
    }

    qrBox.innerHTML = "";

    let canvas = document.createElement("canvas");
    qrBox.appendChild(canvas);

    QRCode.toCanvas(canvas, text, { width: 200 }, function (error) {
        if (error) console.error(error);
    });

    document.getElementById("downloadBtn").disabled = false;
}

function downloadQR(){
    let canvas = document.querySelector("canvas");

    if(!canvas){
        alert("Generate QR first!");
        return;
    }

    let link = document.createElement("a");
    link.download = "qr-code.png";
    link.href = canvas.toDataURL();
    link.click();
}
</script>

</body>
</html>
